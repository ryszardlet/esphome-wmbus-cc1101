# Minimal ESPHome example for wmbus_cc1101
# - Reads two Apator AT-WMBUS-16-2 water meters via a CC1101 radio module
# - Compatible with ESPHome 2026.4.x and Arduino-ESP32 3.x

esphome:
  name: wmbus-bridge

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
ota:
  - platform: esphome

external_components:
  - source: github://ryszardlet/esphome-wmbus-cc1101@main
    components: [ wmbus_cc1101 ]

wmbus_cc1101:
  mosi_pin: GPIO23
  miso_pin: GPIO19
  clk_pin:  GPIO18
  cs_pin:   GPIO5
  gdo0_pin: GPIO4
  gdo2_pin: GPIO27
  frequency: 868.950
  log_unknown: true

sensor:
  - platform: wmbus_cc1101
    meter_id: 0x2541145
    type: apator162
    key: "00000000000000000000000000000000"
    total_water_m3:
      name: "Zimna woda dom"
      device_class: water
      state_class: total_increasing
      accuracy_decimals: 3
    rssi:
      name: "Zimna woda dom RSSI"
      entity_category: diagnostic

  - platform: wmbus_cc1101
    meter_id: 0x2608096
    type: apator162
    key: "00000000000000000000000000000000"
    total_water_m3:
      name: "Zimna woda ogród"
      device_class: water
      state_class: total_increasing
      accuracy_decimals: 3
    rssi:
      name: "Zimna woda ogród RSSI"
      entity_category: diagnostic
